workflows:
  ios-app:
    name: Build iOS App
    environment:
      xcode: latest
    scripts:
      - name: Build with xcodebuild using simple setup
        script: |
          # 创建必要的目录结构
          mkdir -p Sources
          cp KidsLock.swift Sources/main.swift
          
          # 创建 Info.plist
          cat > Info.plist << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleDevelopmentRegion</key>
            <string>en</string>
            <key>CFBundleExecutable</key>
            <string>KidsLock</string>
            <key>CFBundleIdentifier</key>
            <string>com.kidslock.app</string>
            <key>CFBundleInfoDictionaryVersion</key>
            <string>6.0</string>
            <key>CFBundleName</key>
            <string>KidsLock</string>
            <key>CFBundlePackageType</key>
            <string>APPL</string>
            <key>CFBundleShortVersionString</key>
            <string>1.0</string>
            <key>CFBundleVersion</key>
            <string>1</string>
            <key>LSRequiresIPhoneOS</key>
            <true/>
            <key>UILaunchStoryboardName</key>
            <string>LaunchScreen</string>
            <key>UIRequiredDeviceCapabilities</key>
            <array>
              <string>armv7</string>
            </array>
            <key>UISupportedInterfaceOrientations</key>
            <array>
              <string>UIInterfaceOrientationPortrait</string>
            </array>
          </dict>
          </plist>
          EOF
          
          # 使用 xcodebuild 构建
          xcodebuild -workspace . -scheme KidsLock build || \
          xcodebuild -project . -scheme KidsLock build || \
          swift build
          
      - name: Create IPA
        script: |
          # 查找生成的 .app 文件
          find . -name "*.app" -type d
          
          # 如果有 .app 文件，打包成 IPA
          APP_PATH=$(find . -name "*.app" -type d | head -n 1)
          if [ -n "$APP_PATH" ]; then
            mkdir -p Payload
            cp -r "$APP_PATH" Payload/
            zip -r KidsLock.ipa Payload
          fi
    artifacts:
      - "*.ipa"
      - "*.app"
